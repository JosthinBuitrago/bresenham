<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>algoritmo de bresenham</title>
    <style>
        body { font-family: sans-serif; display: flex; gap: 30px; padding: 20px; }
        .panel { display: flex; flex-direction: column; }
        .controles { margin-bottom: 20px; padding: 15px; background: #f0f0f0; border-radius: 8px; }
        input { width: 50px; margin-right: 15px; }
        canvas { border: 1px solid #ccc; background: #fff; }
        table { border-collapse: collapse; width: 100%; font-size: 14px; }
        th, td { border: 1px solid #aaa; padding: 6px; text-align: center; }
        th { background: #eee; }
    </style>
</head>
<body>
    <div class="panel">
        <div class="controles">
            <h3>coordenadas</h3>
            <label>x0: <input type="number" id="x0" value="2"></label>
            <label>y0: <input type="number" id="y0" value="2"></label><br><br>
            <label>x1: <input type="number" id="x1" value="15"></label>
            <label>y1: <input type="number" id="y1" value="10"></label><br><br>
            <button id="btn-dibujar">dibujar linea</button>
        </div>
        <canvas id="lienzo" width="450" height="450"></canvas>
    </div>
    <div class="panel" style="flex-grow: 1;">
        <h3>tabla de variables paso a paso</h3>
        <table id="tabla-variables">
            <thead>
                <tr>
                    <th>paso</th><th>x0</th><th>y0</th><th>dx</th><th>dy</th><th>sx</th><th>sy</th><th>err</th><th>e2</th>
                </tr>
            </thead>
            <tbody id="cuerpo-tabla">
            </tbody>
        </table>
    </div>

    <script>
        const canvas = document.getElementById('lienzo');
        const ctx = canvas.getContext('2d');
        const offset = 30;
        const gridSize = 20;

        function dibujarEscalas(ctx, width, height) {
            ctx.clearRect(0, 0, width, height);
            ctx.fillStyle = "black";
            ctx.font = "10px sans-serif";
            ctx.strokeStyle = "#e0e0e0";

            for (let x = 0; x <= (width - offset) / gridSize; x++) {
                let px = offset + x * gridSize;
                ctx.beginPath(); ctx.moveTo(px, 0); ctx.lineTo(px, height - offset); ctx.stroke();
                if (x % 2 === 0) ctx.fillText(x, px - 3, height - offset + 15);
            }

            for (let y = 0; y <= (height - offset) / gridSize; y++) {
                let py = (height - offset) - y * gridSize;
                ctx.beginPath(); ctx.moveTo(offset, py); ctx.lineTo(width, py); ctx.stroke();
                if (y % 2 === 0) ctx.fillText(y, 5, py + 4);
            }

            ctx.strokeStyle = "black";
            ctx.beginPath();
            ctx.moveTo(offset, 0); ctx.lineTo(offset, height - offset);
            ctx.moveTo(offset, height - offset); ctx.lineTo(width, height - offset);
            ctx.stroke();
        }

        function plot(x, y) {
            let px = offset + x * gridSize;
            let py = (canvas.height - offset) - y * gridSize;
            ctx.fillStyle = "red";
            ctx.fillRect(px - gridSize/2, py - gridSize/2, gridSize, gridSize);
        }

        function bresenham(x0, y0, x1, y1, plotFn, tbody) {
            let dx = Math.abs(x1 - x0);
            let dy = Math.abs(y1 - y0);
            let sx = (x0 < x1) ? 1 : -1;
            let sy = (y0 < y1) ? 1 : -1;
            let err = dx - dy;
            let paso = 0;

            while (true) {
                let e2 = 2 * err;
                
                let fila = `<tr>
                    <td>${paso}</td><td>${x0}</td><td>${y0}</td>
                    <td>${dx}</td><td>${dy}</td><td>${sx}</td>
                    <td>${sy}</td><td>${err}</td><td>${e2}</td>
                </tr>`;
                tbody.innerHTML += fila;

                plotFn(x0, y0);
                if (x0 === x1 && y0 === y1) break;
                
                if (e2 > -dy) { err -= dy; x0 += sx; }
                if (e2 < dx) { err += dx; y0 += sy; }
                paso++;
            }
        }

        // inicializacion visual
        dibujarEscalas(ctx, canvas.width, canvas.height);

        // captura de eventos
        document.getElementById('btn-dibujar').addEventListener('click', function() {
            let x0 = parseInt(document.getElementById('x0').value, 10);
            let y0 = parseInt(document.getElementById('y0').value, 10);
            let x1 = parseInt(document.getElementById('x1').value, 10);
            let y1 = parseInt(document.getElementById('y1').value, 10);
            let tbody = document.getElementById('cuerpo-tabla');

            // limpiar ejecuciones anteriores
            tbody.innerHTML = '';
            dibujarEscalas(ctx, canvas.width, canvas.height);

            // ejecutar algoritmo
            bresenham(x0, y0, x1, y1, plot, tbody);
        });
    </script>
</body>
</html>
