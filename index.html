<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Algoritmo de Bresenham</title>
</head>
<body>

    <h1>Dibujo de líneas - Bresenham</h1>

    <!-- Inputs para coordenadas -->
    <label>x0:</label>
    <input type="number" id="x0">

    <label>y0:</label>
    <input type="number" id="y0">

    <label>x1:</label>
    <input type="number" id="x1">

    <label>y1:</label>
    <input type="number" id="y1">

    <br><br>

    <button onclick="dibujar()">Dibujar línea</button>

    <br><br>

    <!-- Canvas -->
    <canvas id="canvas" width="400" height="400" style="border:1px solid black;"></canvas>

    <br><br>

    <!-- Tabla de resultados -->
    <table border="1" id="tabla">
        <thead>
            <tr>
                <th>Paso</th>
                <th>x</th>
                <th>y</th>
                <th>err</th>
                <th>e2</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script src="script.js"></script>

</body>
</html>
